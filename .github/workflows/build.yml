name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build src/Ashenfall.sln -c Release
      - run: dotnet test tests/Ashenfall.Domain.Tests -c Release
